version: "3.9"
services:
  sysadmin-bot:
    build: .
    container_name: invisible-sysadmin
    restart: unless-stopped
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/compose-files:/opt/compose-files
      - /var/log/nginx:/var/log/nginx:ro
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
